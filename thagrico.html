<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Thagrico GIS Map</title>
    <style>
      #map {
        height: 100vh;
        width: 100%;
      }
    </style>
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
    <script>
      function initMap() {
        var map = new google.maps.Map(document.getElementById('map'), {
          center: {lat: 13.983, lng: 108.000}, // toạ độ Gia Lai
          zoom: 12
        });

        // Danh sách các file KML trong repo GIS
        var kmlFiles = [
          'https://thagrico.github.io/GIS/Boder1_2026_5_8_15_18.KML',
          'https://thagrico.github.io/GIS/Nhan_lo_BP1_2026_5_8_15_14.KML',
          'https://thagrico.github.io/GIS/Ranh_thua_2026_5_9_08_21.KML',
          'https://thagrico.github.io/GIS/thuab_2026_5_19_16_50.KML'
        ];

        // Load từng file KML lên bản đồ
        kmlFiles.forEach(function(url) {
          new google.maps.KmlLayer({
            url: url,
            map: map,
            preserveViewport: true
          });
        });
      }
    </script>
  </head>
  <body onload="initMap()">
    <div id="map"></div>
  </body>
</html>
