<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thagrico.map</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    .logo {
      width: 192px;
      height: 192px;
    }
    .flags {
      margin-top: 160px; /* đẩy xuống sâu gấp đôi so với trước */
    }
    .flags img {
      width: 288px;   /* gấp rưỡi so với 192px */
      height: 189px;  /* gấp rưỡi so với 126px */
      margin: 0 25px;
      cursor: pointer;
      border: 2px solid #ccc;
    }
    /* Responsive cho điện thoại */
    @media (max-width: 600px) {
      .flags {
        margin-top: 240px; /* đẩy xuống sâu hơn nữa trên mobile */
      }
      .flags img {
        width: 50vw;   /* chiếm 50% chiều ngang màn hình */
        height: auto;  /* tự động giữ tỉ lệ */
      }
    }
  </style>
</head>
<body>
  <!-- Tiêu đề chào mừng -->
  <h1 id="title">Chào mừng bạn đến với Thagrico.map!</h1>

  <!-- Logo -->
  <img src="icon-192.png" alt="Logo" class="logo">

  <!-- Hai lá cờ -->
  <div class="flags">
    <img src="VN.png" alt="Tiếng Việt" id="flag-vn">
    <img src="UK.png" alt="English" id="flag-uk">
  </div>

  <!-- Nội dung -->
  <p id="content">Welcome to Thagrico.map!</p>

  <script>
    // Nội dung đa ngôn ngữ
    const translations = {
      vi: {
        title: "Chào mừng bạn đến với Thagrico.map!",
        content: "Chào mừng bạn đến với Thagrico.map!"
      },
      en: {
        title: "Welcome to Thagrico.map!",
        content: "Welcome to Thagrico.map!"
      }
    };

    // Hàm đổi ngôn ngữ
    function setLanguage(lang) {
      document.getElementById("title").innerText = translations[lang].title;
      document.getElementById("content").innerText = translations[lang].content;
    }

    // Sự kiện click vào cờ
    document.getElementById("flag-vn").onclick = function() {
      setLanguage("vi");
    };
    document.getElementById("flag-uk").onclick = function() {
      setLanguage("en");
    };

    // Đăng ký Service Worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("Service Worker registered:", reg))
        .catch(err => console.log("Service Worker registration failed:", err));
    }
  </script>
</body>
</html>
