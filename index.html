<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thagrico Web</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    .logo {
      width: 192px;
      height: 192px;
    }
    .flags {
      margin-top: 20px;
    }
    .flags img {
      width: 64px;
      height: 42px;
      margin: 0 10px;
      cursor: pointer;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1 id="title">Trang web Thagrico</h1>

  <!-- Logo -->
  <img src="icon-192.png" alt="Logo" class="logo">

  <!-- Hai lá cờ -->
  <div class="flags">
    <img src="VN.png" alt="Tiếng Việt" id="flag-vn">
    <img src="UK.png" alt="English" id="flag-uk">
  </div>

  <p id="content">Chào mừng bạn đến với trang web của Thagrico!</p>

  <script>
    // Nội dung đa ngôn ngữ
    const translations = {
      vi: {
        title: "Trang web Thagrico",
        content: "Chào mừng bạn đến với trang web của Thagrico!"
      },
      en: {
        title: "Thagrico Website",
        content: "Welcome to Thagrico's website!"
      }
    };

    // Hàm đổi ngôn ngữ
    function setLanguage(lang) {
      document.getElementById("title").innerText = translations[lang].title;
      document.getElementById("content").innerText = translations[lang].content;
    }

    // Sự kiện click vào cờ
    document.getElementById("flag-vn").onclick = function() {
      setLanguage("vi");
    };
    document.getElementById("flag-uk").onclick = function() {
      setLanguage("en");
    };

    // Đăng ký Service Worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("Service Worker registered:", reg))
        .catch(err => console.log("Service Worker registration failed:", err));
    }
  </script>
</body>
</html>
