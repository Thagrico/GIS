<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thagrico.map</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    h1 {
      font-size: 3.5em; /* lớn hơn chữ Welcome */
      margin-bottom: 40px;
    }
    .logo {
      width: 192px;
      height: 192px;
    }
    .flags {
      margin-top: 160px; /* đẩy xuống sâu gấp đôi */
    }
    .flags img {
      width: 288px;   /* gấp rưỡi so với 192px */
      height: 189px;  /* gấp rưỡi so với 126px */
      margin: 0 25px;
      cursor: pointer;
      border: 2px solid #ccc;
    }
    #content {
      font-size: 3em; /* chữ Welcome to... to gấp 3 lần */
      margin-top: 60px;
    }
    @media (max-width: 600px) {
      h1 {
        font-size: 3em;
      }
      #content {
        font-size: 2.5em;
      }
      .flags {
        margin-top: 240px;
      }
      .flags img {
        width: 50vw;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Tiêu đề chào mừng -->
  <h1>Chào mừng bạn đến với Thagrico.map!</h1>

  <!-- Logo -->
  <img src="icon-192.png" alt="Logo" class="logo">

  <!-- Hai lá cờ (cùng trỏ về Google Sites) -->
  <div class="flags">
    <a href="https://sites.google.com/d/1b19z4hvx-dnw1KHvW_N_4k0eEPve3gFv/p/1SLR8RuyhdnkyI98SrjSMYfje3xu87Otp/edit" target="_blank">
      <img src="VN.png" alt="Tiếng Việt">
    </a>
    <a href="https://sites.google.com/d/1b19z4hvx-dnw1KHvW_N_4k0eEPve3gFv/p/1SLR8RuyhdnkyI98SrjSMYfje3xu87Otp/edit" target="_blank">
      <img src="UK.png" alt="English">
    </a>
  </div>

  <!-- Nội dung -->
  <p id="content">Welcome to Thagrico.map!</p>

  <script>
    // Đăng ký Service Worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("Service Worker registered:", reg))
        .catch(err => console.log("Service Worker registration failed:", err));
    }
  </script>
</body>
