<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thagrico.map</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 40px;
    }
    .logo {
      width: 192px;
      height: 192px;
    }
    .flags {
      margin-top: 100px;
    }
    .flags img {
      width: 288px;
      height: 189px;
      margin: 0 25px;
      cursor: pointer;
      border: 2px solid #ccc;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .flags img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    #content {
      font-size: 2em;
      margin-top: 60px;
    }
  </style>
</head>
<body>
  <h1>Chào mừng bạn đến với Thagrico.map!</h1>

  <img src="icon-192.png" alt="Logo" class="logo">

  <!-- Hai lá cờ trỏ về link mới -->
  <div class="flags">
    <a href="https://sites.google.com/view/thagrico1/maps" target="_blank">
      <img src="VN.png" alt="Tiếng Việt">
    </a>
    <a href="https://sites.google.com/view/thagrico2/maps" target="_blank">
      <img src="UK.png" alt="English">
    </a>
  </div>

  <p id="content">Welcome to Thagrico.map!</p>
</body>
</html>
